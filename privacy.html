<h1>개인정보처리방침</h1>
<p>본 앱(230 테니스 매치)은 사용자 데이터를 안전하게 보호하며, 다음과 같은 목적으로 개인정보를 수집 및 이용합니다.</p>

<h2>1. 수집하는 정보</h2>
<ul>
<li>이름</li>
<li>전화번호</li>
<li>예약 정보 및 경기 기록</li>
</ul>

<h2>2. 이용 목적</h2>
<ul>
<li>코트 예약 및 경기 운영</li>
<li>사용자 식별 및 관리</li>
</ul>

<h2>3. 보관 기간</h2>
<p>서비스 제공 기간 동안 보관되며, 사용자가 삭제 요청 시 즉시 삭제됩니다.</p>

<h2>4. 제3자 제공</h2>
<p>사용자 동의 없이 외부에 제공하지 않습니다.</p>

<h2>5. 문의</h2>
<p>문의: 관리자</p>
